<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="volver" href="index.html">← Volver al Inicio</a>
    <h1>Registro de Personas</h1>

    <form id="formPersona">
        <div class="campo"><label>Nombre:</label><input type="text" name="nombre" required></div>
        <div class="campo"><label>Apellido:</label><input type="text" name="apellido" required></div>
        <div class="campo"><label>Edad:</label><input type="number" name="edad" required></div>
        <div class="campo"><label>Altura (metros):</label><input type="number" step="0.01" name="altura" required></div>
        <div class="campo"><label>Peso (kg):</label><input type="number" step="0.1" name="peso" required></div>
        <button type="submit" class="btn-js">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th><th>Apellido</th><th>Edad</th><th>Altura</th><th>Peso</th><th>IMC</th><th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
